services:
  - type: web
    name: wallet-backend
    runtime: jvm
    plan: free
    buildCommand: cd backend && ../gradlew build -x test
    startCommand: java -jar build/libs/wallet-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: wallet-db
          property: connectionString
