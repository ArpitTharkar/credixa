spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/myappdb}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api
